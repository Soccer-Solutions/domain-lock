<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>National Soccer Solutions</title>
  <link rel="icon" type="image/png" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">


  <!-- Match ESS Academy theme -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      /* Pulled from your ESS Academy CSS */
      --accent: #00ff44;
      --bg-dark: #0d0d0d;
      --bg-darker: #000000;
      --text-light: #f5f5f5;
      --text-grey: #6e6e6e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Poppins', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text-light);

  background:
    linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.55)),
    url('website%20cover_dobson%20field.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-color: var(--bg-dark);
}

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }

    h1 {
      margin: 0 auto 16px;
      font-size: clamp(26px, 3.2vw, 42px);
      line-height: 1.15;
      letter-spacing: -0.02em;
      max-width: 24ch;
      font-weight: 600;
    }

.subhead{
  margin: 0 auto 18px;
  max-width: 60ch;
  font-size: 1rem;
  line-height: 1.6;
  text-shadow: 0 2px 10px rgba(0,0,0,1);
}

.subhead .muted{
  color: var(--text-black);
  font-weight: 400;
}

.subhead strong{
  color: var(--text-light);
  font-weight: 600;
}

    
    /* BUTTON (glow) */
    .btn {
      display: inline-block;
      padding: 0.75rem 1.25rem;
      border: 2px solid var(--accent);
      border-radius: 8px;
      background: transparent;
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 0 20px var(--accent);
      transition: box-shadow 0.3s ease, background-color 0.3s ease, color 0.3s ease;
    }

    .btn:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 30px var(--accent), 0 0 60px var(--accent);
    }

    .btn-stack{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
      
  </style>
</head>
<body>
  <main>
    <div>
      <h1>STANDARDIZED DEVELOPMENT + VERIFICATION FOR SOCCER CLUBS AND ACADEMIES</h1>
      <p class="subhead"> Managed athlete mastery tracking + dashboards that remove guesswork as players grow </p>


      <div class="btn-stack">
      <a class="btn" href="https://essa.soccer" target="_blank" rel="noopener">
        Explore ESS Academy
      </a>
        
      <a class="btn" href="mailto:info@nationalsoccersolutions.com?subject=Soccer%20Solutions%20Inquiry&body=Hi%20Soccer%20Solutions,%0D%0A%0D%0A%5BINSERT%20COMMENTS%20OR%20QUESTIONS%5D%0D%0A%0D%0AClub%2FAcademy%3A%0D%0ACity%3A%0D%0AAthlete%20count%3A%0D%0AWhat%20you%27re%20trying%20to%20measure%3A%0D%0A%0D%0AThanks,">
        Get in touch
      </a>
      </div>
      
    </div>
  </main>
</body>
</html>
